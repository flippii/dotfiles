schemaVersion: 1
kind: agent
name: pi
agent:
  image: docker/sandbox-templates:shell-docker
  aiFilename: AGENTS.md
  entrypoint:
    run: [pi]

network:
  allowedDomains:
    - "pi.dev:443"

environment:
  variables:
    PI_CODING_AGENT_DIR: "~"

commands:
  install:
    - command: "npm install -g --ignore-scripts @earendil-works/pi-coding-agent"
      user: "1000"
      description: Install Pi
